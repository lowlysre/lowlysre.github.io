<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lowlysre</title>
<meta name="description" content="Humanism through technology. Open source projects from the lowlysre org.">
<link rel="icon" href="/favicon.ico">
<style>
  :root {
    --bg: #fdf6e3; --fg: #24292f; --muted: #57606a; --card: #ffffff; --border: #d0d7de; --accent: #2da44e;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0d1117; --fg: #e6edf3; --muted: #8b949e; --card: #161b22; --border: #30363d; --accent: #3fb950; }
  }
  * { box-sizing: border-box; }
  body { font-family: ui-monospace, Consolas, monospace; background: var(--bg); color: var(--fg); margin: 0; padding: 48px 24px; max-width: 1024px; margin-inline: auto; }
  header { text-align: center; margin-bottom: 56px; }
  header img { width: 140px; height: 140px; border-radius: 24px; }
  h1 { font-size: 32px; margin: 20px 0 6px; letter-spacing: 1px; }
  .tagline { color: var(--muted); margin: 0; font-size: 15px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; transition: border-color .15s, transform .15s; text-decoration: none; color: inherit; }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card h2 { font-size: 16px; margin: 0 0 8px; color: var(--accent); }
  .card p { font-size: 13.5px; color: var(--muted); margin: 0 0 14px; line-height: 1.5; flex: 1; }
  .meta { font-size: 12px; color: var(--muted); display: flex; gap: 14px; }
  .meta span::before { content: ''; }
  .lang-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); margin-right: 5px; vertical-align: -1px; }
  #status { text-align: center; color: var(--muted); padding: 32px; }
  footer { margin-top: 64px; text-align: center; color: var(--muted); font-size: 13px; line-height: 2; }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<header>
  <picture>
    <source srcset="/assets/svg/icon-dark.svg" media="(prefers-color-scheme: dark)">
    <img src="/assets/svg/icon-light.svg" alt="lowlysre inchworm">
  </picture>
  <h1>lowlysre</h1>
  <p class="tagline">Humanism through technology. ☮️</p>
  <p class="tagline" style="margin-top:6px;">Systems that don't implode - humility, clarity, and evidence. One inch at a time. 🐛</p>
</header>

<div id="status">loading projects…</div>
<div class="grid" id="projects"></div>

<footer>
  <a href="https://github.com/lowlysre">github.com/lowlysre</a> ·
  <a href="https://lowlysre.substack.com/">substack</a> ·
  <a href="/brand/">brand assets</a> ·
  <a href="https://github.com/lowlydba">@lowlydba</a>
</footer>

<script>
const HIDDEN = new Set(['.github', 'lowlysre.github.io']);
// Curated live links shown on matching project cards
const LIVE_LINKS = {
  'cron-drift': { label: 'live dashboard', url: 'https://lowlysre.grafana.net/public-dashboards/66e12b0c83214d88ab4040521de1e874' },
};
const langColors = { JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5', Go: '#00ADD8', Rust: '#dea584', Shell: '#89e051', HTML: '#e34c26', Jsonnet: '#0064bd', Dockerfile: '#384d54' };

fetch('https://api.github.com/orgs/lowlysre/repos?per_page=100&sort=updated')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(repos => {
    const shown = repos.filter(r => !HIDDEN.has(r.name) && !r.archived && !r.fork);
    shown.sort((a, b) => b.stargazers_count - a.stargazers_count || a.name.localeCompare(b.name));
    document.getElementById('status').style.display = 'none';
    document.getElementById('projects').innerHTML = shown.map(r => `
      <div class="card" onclick="location.href='${r.html_url}'" style="cursor:pointer;">
        <h2>${r.name}</h2>
        <p>${r.description ? r.description.replace(/</g, '&lt;') : 'No description yet.'}</p>
        <div class="meta">
          ${r.language ? `<span><i class="lang-dot" style="background:${langColors[r.language] || 'var(--accent)'}"></i>${r.language}</span>` : ''}
          <span>★ ${r.stargazers_count}</span>
          ${LIVE_LINKS[r.name] ? `<span><a href="${LIVE_LINKS[r.name].url}" style="color:var(--accent);text-decoration:none;" onclick="event.stopPropagation()">📈 ${LIVE_LINKS[r.name].label}</a></span>` : ''}
        </div>
      </div>`).join('');
  })
  .catch(() => {
    document.getElementById('status').innerHTML =
      'Couldn\'t load projects - browse them on <a href="https://github.com/lowlysre" style="color:var(--accent)">GitHub</a>.';
  });
</script>
</body>
</html>
